<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>India Digital Twin - Stable Build</title>
    <script src="https://cesium.com"></script>
    <link href="https://cesium.com" rel="stylesheet">
    <style>
        #cesiumContainer { width: 100%; height: 100vh; margin: 0; background: #000; }
        #panel { position: absolute; top: 10px; left: 10px; background: rgba(20,20,20,0.9); color: white; padding: 20px; z-index: 10; border-radius: 10px; width: 250px; border: 1px solid #00ff00; }
        button { width: 100%; margin-top: 10px; padding: 10px; cursor: pointer; background: #333; color: white; border: 1px solid #555; border-radius: 5px; }
        button:hover { background: #00ff00; color: black; }
    </style>
</head>
<body>
    <div id="panel">
        <h2 style="color: #00ff00; margin:0;">India Digital Twin</h2>
        <p style="font-size: 12px;">System: <span id="status">Initializing...</span></p>
        <hr>
        <button onclick="zoomIndia()">📍 Reset View (India)</button>
        <button onclick="toggleBhuvan()">📡 Toggle Bhuvan Layer</button>
        <hr>
        <div style="font-size: 11px; color: #aaa;">Past | Present | Future Mode Active</div>
    </div>
    <div id="cesiumContainer"></div>

    <script>
        // 1. Setup Viewer with Backup Map (OpenStreetMap) taaki screen khali na rahe
        const viewer = new Cesium.Viewer('cesiumContainer', {
            terrainProvider: Cesium.createWorldTerrain(),
            baseLayerPicker: true, // Aap khud map badal sakte hain
            animation: false,
            timeline: false
        });

        // 2. Bhuvan Layer (Manual Toggle)
        let bhuvanLayer;
        function toggleBhuvan() {
            if (bhuvanLayer) {
                viewer.imageryLayers.remove(bhuvanLayer);
                bhuvanLayer = null;
                document.getElementById('status').innerText = "Using Backup Map";
            } else {
                bhuvanLayer = viewer.imageryLayers.addImageryProvider(new Cesium.WebMapServiceImageryProvider({
                    url : 'https://nrsc.gov.in',
                    layers : 'india3arc',
                    parameters : { transparent : 'true', format : 'image/png' }
                }));
                document.getElementById('status').innerText = "Connecting Bhuvan...";
            }
        }

        // 3. Proper Zoom to India
        function zoomIndia() {
            viewer.camera.flyTo({
                destination : Cesium.Cartesian3.fromDegrees(78.9629, 22.5937, 6000000.0),
                orientation : { pitch : Cesium.Math.toRadians(-45.0) }
            });
        }

        // Initialize view
        setTimeout(() => {
            zoomIndia();
            document.getElementById('status').innerText = "System Ready";
        }, 2000);
    </script>
</body>
</html>
