<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <script src="https://cesium.com"></script>
  <link href="https://cesium.com" rel="stylesheet">
  <style>
    #cesiumContainer { width: 100%; height: 100vh; margin: 0; background: black; }
    #status-box { position: absolute; top: 20px; left: 20px; background: white; padding: 10px; z-index: 1; border-radius: 5px; font-family: sans-serif; }
  </style>
</head>
<body>
  <div id="status-box">
    <b>3D System Test</b><br>
    <span id="msg">Loading 3D Globe...</span>
  </div>
  <div id="cesiumContainer"></div>
  <script>
    try {
        // Sirf ek simple 3D Globe bina kisi heavy layer ke
        const viewer = new Cesium.Viewer('cesiumContainer', {
            imageryProvider: new Cesium.TileMapServiceImageryProvider({
                url: Cesium.buildModuleUrl('Assets/Textures/NaturalEarthII'),
            }),
            baseLayerPicker: false,
            geocoder: false,
            timeline: false,
            animation: false
        });
        document.getElementById('msg').innerText = "SUCCESS: 3D Globe Active!";
    } catch (e) {
        document.getElementById('msg').innerText = "ERROR: Browser does not support 3D.";
    }
  </script>
</body>
</html>
