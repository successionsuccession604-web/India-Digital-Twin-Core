<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://cesium.com"></script>
  <link href="https://cesium.com" rel="stylesheet">
  <style>
    #cesiumContainer { width: 100%; height: 100vh; margin: 0; }
    #ui { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); color: white; padding: 10px; z-index: 10; border-radius: 5px; }
  </style>
</head>
<body>
  <div id="ui">
    <h3>India Digital Twin</h3>
    <button onclick="alert('Past Data Loading...')">Past</button>
    <button onclick="alert('Present Data Live')">Present</button>
    <button onclick="alert('Future Simulation')">Future</button>
  </div>
  <div id="cesiumContainer"></div>
  <script>
    const viewer = new Cesium.Viewer('cesiumContainer', { terrainProvider: Cesium.createWorldTerrain() });
    viewer.imageryLayers.addImageryProvider(new Cesium.WebMapServiceImageryProvider({
        url : 'https://nrsc.gov.in',
        layers : 'india3arc'
    }));
  </script>
</body>
</html>
