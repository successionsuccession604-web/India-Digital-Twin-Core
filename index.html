<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://cesium.com"></script>
  <link href="https://cesium.com" rel="stylesheet">
  <style>
    #cesiumContainer { width: 100%; height: 100vh; margin: 0; background: #000; }
    #ui { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); color: white; padding: 15px; z-index: 10; border-radius: 8px; font-family: Arial; border: 1px solid #444; }
    button { cursor: pointer; margin: 5px 0; width: 100%; padding: 8px; background: #333; color: white; border: 1px solid #666; }
    button:hover { background: #555; }
  </style>
</head>
<body>
  <div id="ui">
    <h3 style="margin:0 0 10px 0;">India Digital Twin</h3>
    <p style="font-size: 12px; color: #aaa;">Status: <span id="status">Connecting Bhuvan...</span></p>
    <button onclick="zoomToIndia()">📍 Focus India (3D)</button>
    <hr>
    <button onclick="setLayer('past')">🕒 Past (2005)</button>
    <button onclick="setLayer('present')">📡 Present (Live)</button>
    <button onclick="setLayer('future')">🚀 Future (Sim)</button>
  </div>
  <div id="cesiumContainer"></div>

  <script>
    // 1. Initialize 3D Globe with Default Terrain
    const viewer = new Cesium.Viewer('cesiumContainer', {
        terrainProvider: Cesium.createWorldTerrain(),
        baseLayerPicker: false,
        timeline: false,
        animation: false
    });

    // 2. Bhuvan Live Layer Setup
    const bhuvanProvider = new Cesium.WebMapServiceImageryProvider({
        url : 'https://nrsc.gov.in',
        layers : 'india3arc',
        parameters : { transparent : 'true', format : 'image/png', styles: 'default' }
    });
    
    const layer = viewer.imageryLayers.addImageryProvider(bhuvanProvider);

    // 3. Function to Zoom and Force Load
    function zoomToIndia() {
        document.getElementById('status').innerText = "Loading Live Data...";
        viewer.camera.flyTo({
            destination : Cesium.Cartesian3.fromDegrees(78.9629, 20.5937, 4000000.0), // Zoom to India height
            orientation : { pitch : Cesium.Math.toRadians(-35.0) } // 3D View Angle
        });
    }

    function setLayer(mode) {
        alert("Plug-and-Play: " + mode.toUpperCase() + " layer integration logic active.");
    }

    // Auto-zoom on start
    setTimeout(zoomToIndia, 2000);
  </script>
</body>
</html>
