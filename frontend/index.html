<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <!-- CesiumJS Libraries -->
  <script src="https://cesium.com"></script>
  <link href="https://cesium.com" rel="stylesheet">
  <style>
    #cesiumContainer { width: 100%; height: 100vh; margin: 0; padding: 0; }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <script>
    // 1. Initialize 3D Globe
    const viewer = new Cesium.Viewer('cesiumContainer', {
      terrainProvider: Cesium.createWorldTerrain() // Ye 2D ko 3D pahado mein badal dega
    });

    // 2. Add Bhuvan Live 2D Layer (Imagery)
    const bhuvanLayer = viewer.imageryLayers.addImageryProvider(new Cesium.WebMapServiceImageryProvider({
        url : 'https://nrsc.gov.in',
        layers : 'india3arc', 
        parameters : { transparent : 'true', format : 'image/png' }
    }));

    // 3. Zoom to India (Default View)
    viewer.camera.flyTo({
      destination : Cesium.Cartesian3.fromDegrees(78.9629, 20.5937, 10000000.0)
    });
  </script>
</body>
</html>
